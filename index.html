<!DOCTYPE html>
<html>
  <head>
    <title>Jackson Nunley</title>
  </head>

  <body>
    <div id="container">
      <canvas id="canvas"></canvas>
      <p id="name">Jackson Nunley</p>
      <a class="username-link" href="https://github.com/Noskcaj19">
        <p id="gh-username">
          <img class="username-icon" src="./assets/gh.png" />@Noskcaj19
        </p>
      </a>
      <a
        class="username-link"
        href="https://www.linkedin.com/in/jackson-nunley-b490901b9/"
      >
        <p id="ln-username">
          <img class="username-icon" src="./assets/ln.png" />Jackson Nunley
        </p>
      </a>
      <p id="tag">Writing code for fun and profit</p>
      <p id="school">Currently at Florida Polytechnic University</p>
    </div>
    <button id="pause-button"></button>
    <script src="index.js"></script>
  </body>
  <link
    href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      margin: 0px;
      background-color: black;
    }

    p {
      color: white;
      font-family: "Avenir", sans-serif;
    }

    a {
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #canvas {
      z-index: -1;
      position: absolute;
      top: 0px;
      bottom: 0px;
      left: 0px;
      right: 0px;
    }

    #container {
      text-align: center;
    }

    #name {
      margin-top: 0.5em;
      margin-bottom: 0px;
      font-size: 7em;
    }

    .username-icon {
      height: 0.75em;
      margin-right: 8px;
    }

    .username-link {
      display: inline;
    }

    #gh-username {
      margin-top: 0px;
      margin-bottom: 0px;
      font-size: 3em;
      font-family: "Inconsolata", sans-serif;
    }

    #ln-username {
      margin-top: 0px;
      font-size: 2.5em;
    }

    #tag {
      font-size: 1.5em;
    }

    #school {
      font-size: 1.25em;
    }

    button#pause-button.paused {
      background-image: url(./assets/resume.svg);
    }

    #pause-button {
      padding: 1em;
      background-image: url(./assets/pause.svg);
      background-color: transparent;
      background-size: 0.6em;
      background-position: center;
      appearance: none;
      position: absolute;
      top: 0.75em;
      left: 0.75em;
      border: none;
      background-repeat: no-repeat;
      cursor: pointer;
    }
  </style>
</html>
